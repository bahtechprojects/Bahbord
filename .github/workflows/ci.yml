name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint (non-blocking)
        run: npx next lint || true
      - name: Build
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: 'pk_test_dummy'
          CLERK_SECRET_KEY: 'sk_test_dummy'
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: humaniza
          POSTGRES_PASSWORD: humaniza123
          POSTGRES_DB: bahboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: 'postgres://humaniza:humaniza123@localhost:5432/bahboard'
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_TEST_EMAIL: ${{ secrets.CLERK_TEST_EMAIL }}
      CLERK_TEST_PASSWORD: ${{ secrets.CLERK_TEST_PASSWORD }}
      E2E_BOARD_ID: ${{ secrets.E2E_BOARD_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Apply DB migrations / seed
        # TODO(user): trocar pelo comando real de seed (ex: psql -f db/seed.sql)
        # que cria pelo menos um board com UUID conhecido (E2E_BOARD_ID).
        run: |
          for f in db/*.sql; do
            PGPASSWORD=humaniza123 psql -h localhost -U humaniza -d bahboard -f "$f" || true
          done
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        run: npm run e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
